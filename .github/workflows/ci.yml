name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build packaged helper
        shell: pwsh
        run: .\tools\vpn-packaged-helper\scripts\Build-Helper.ps1 -Version 1.0.0

      - name: Build
        shell: cmd
        run: dotnet build src\vpn.csproj -c Release

      - name: Test
        shell: cmd
        run: dotnet test tests\VpnCli.Tests.csproj -c Release --no-restore
