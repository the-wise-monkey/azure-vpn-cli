name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: powershell
        run: |
          $result = Invoke-Pester ./vpn.tests.ps1 -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
