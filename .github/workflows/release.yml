name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build MSIX
        shell: pwsh
        run: .\scripts\Build-Msix.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Rename MSIX with version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Move-Item out\AzureVPN-CLI.msix "out\AzureVPN-CLI-$version.msix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/AzureVPN-CLI-${{ steps.version.outputs.version }}.msix
          generate_release_notes: true
