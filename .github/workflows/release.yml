name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build vpn.exe
        shell: cmd
        run: dotnet build src\vpn.csproj -c Release

      - name: Build Inno Setup installer
        shell: cmd
        run: iscc /DMyAppVersion=${{ steps.version.outputs.version }} installer\vpn-cli.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/AzureVPN-CLI-${{ steps.version.outputs.version }}-setup.exe
          generate_release_notes: true

      - name: Submit to winget
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $repo = "${{ github.repository }}"
          $installerUrl = "https://github.com/${repo}/releases/download/v${version}/AzureVPN-CLI-${version}-setup.exe"

          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

          .\wingetcreate.exe update TheWiseMonkey.AzureVPN-CLI `
            --urls $installerUrl `
            --version $version `
            --token ${{ secrets.WINGET_PAT }} `
            --submit
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
