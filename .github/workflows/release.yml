name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build vpn.exe
        shell: cmd
        run: dotnet build src\vpn.csproj -c Release

      - name: Build Inno Setup installer
        shell: cmd
        run: iscc /DMyAppVersion=${{ steps.version.outputs.version }} installer\vpn-cli.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/AzureVPN-CLI-${{ steps.version.outputs.version }}-setup.exe
          generate_release_notes: true

      - name: Update winget manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $repo = "${{ github.repository }}"
          $installerUrl = "https://github.com/${repo}/releases/download/v${version}/AzureVPN-CLI-${version}-setup.exe"
          $hash = (Get-FileHash "Output/AzureVPN-CLI-${version}-setup.exe" -Algorithm SHA256).Hash

          $manifestDir = "winget-manifest/manifests/t/TheWiseMonkey/AzureVPN-CLI/${version}"
          New-Item -Path $manifestDir -ItemType Directory -Force | Out-Null

          @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json

          PackageIdentifier: TheWiseMonkey.AzureVPN-CLI
          PackageVersion: ${version}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.12.0
          "@ -replace '(?m)^ +','' | Set-Content "$manifestDir/TheWiseMonkey.AzureVPN-CLI.yaml"

          @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json

          PackageIdentifier: TheWiseMonkey.AzureVPN-CLI
          PackageVersion: ${version}
          Installers:
            - Architecture: x64
              InstallerType: inno
              InstallerUrl: ${installerUrl}
              InstallerSha256: ${hash}
              Scope: user
          ManifestType: installer
          ManifestVersion: 1.12.0
          "@ -replace '(?m)^ +','' | Set-Content "$manifestDir/TheWiseMonkey.AzureVPN-CLI.installer.yaml"

          @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json

          PackageIdentifier: TheWiseMonkey.AzureVPN-CLI
          PackageVersion: ${version}
          PackageLocale: en-US
          Publisher: The Wise Monkey
          PublisherUrl: https://github.com/the-wise-monkey
          PackageName: AzureVPN-CLI
          PackageUrl: https://github.com/the-wise-monkey/azure-vpn-cli
          License: MIT
          LicenseUrl: https://github.com/the-wise-monkey/azure-vpn-cli/blob/main/LICENSE
          ShortDescription: CLI wrapper for Azure VPN Client on Windows
          Description: Command-line interface for the Azure VPN Client on Windows. Automates connect, disconnect, import, export, and status operations using UI Automation.
          Tags:
            - vpn
            - azure
            - cli
            - networking
          ManifestType: defaultLocale
          ManifestVersion: 1.12.0
          "@ -replace '(?m)^ +','' | Set-Content "$manifestDir/TheWiseMonkey.AzureVPN-CLI.locale.en-US.yaml"

      - name: Submit to winget
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $manifestDir = "winget-manifest/manifests/t/TheWiseMonkey/AzureVPN-CLI/${version}"

          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

          .\wingetcreate.exe submit $manifestDir `
            --token ${{ secrets.WINGET_PAT }}
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
